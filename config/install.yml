services:

  cawlop.tab.manager:
    class: 'CawlOP\PrestaShop\Utils\TabManager'
    public: true

  cawlop.status.manager:
    class: 'CawlOP\PrestaShop\Utils\OrderStatusManager'
    public: true

  cawlop.installer:
    class: 'CawlOP\PrestaShop\Installer\Installer'
    public: true
    arguments:
      - '@cawlop.module'
      - '@cawlop.tab.manager'
      - '@cawlop.status.manager'
      - '@cawlop.settings.account.updater'
      - '@cawlop.settings.advanced_settings.updater'
      - '@cawlop.settings.payment_methods.updater'
      - !php/const _PS_VERSION_
      - '@cawlop.logger.factory'
