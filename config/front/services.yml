imports:
  - { resource: ../common.yml }
  - { resource: ./payment_builder.yml }

services:

  cawlop.payment.presenter:
    class: 'CawlOP\PrestaShop\Presenter\PaymentOptionsPresenter'
    public: true
    arguments:
      - '@cawlop.module'
      - '@cawlop.settings'
      - '@cawlop.context'

  cawlop.repository.hosted_checkout:
    class: 'CawlOP\PrestaShop\Repository\HostedCheckoutRepository'
    public: true

  cawlop.repository.created_payment:
    class: 'CawlOP\PrestaShop\Repository\CreatedPaymentRepository'
    public: true

  cawlop.checksum.address:
    class: 'AddressChecksum'
    public: true

  cawlop.checksum.cart:
    class: 'WorldlineopCartChecksum'
    public: true
    arguments:
      - '@cawlop.checksum.address'

  cawlop.storedcards.presenter:
    class: 'CawlOP\PrestaShop\Presenter\StoredCardsPresenter'
    public: true
    arguments:
      - '@cawlop.module'
      - '@cawlop.context'
      - '@cawlop.sdk.client'
      - '@cawlop.repository.token'

