services:

  cawlop.shopping_cart.presenter:
    class: 'CawlOP\PrestaShop\Presenter\ShoppingCartPresenter'
    public: true

  cawlop.payment_request.builder:
    class: 'CawlOP\PrestaShop\Builder\PaymentRequestBuilder'
    public: true
    arguments:
      - '@cawlop.settings'
      - '@cawlop.module'
      - '@cawlop.context'
      - '@cawlop.shopping_cart.presenter'

  cawlop.hosted_payment_request.builder:
    class: 'CawlOP\PrestaShop\Builder\HostedPaymentRequestBuilder'
    public: true
    arguments:
      - '@cawlop.settings'
      - '@cawlop.module'
      - '@cawlop.context'
      - '@cawlop.shopping_cart.presenter'

  cawlop.payment_request.director:
    class: 'CawlOP\PrestaShop\Builder\PaymentRequestDirector'
    public: true
    calls:
      - method: setBuilder
        arguments:
          - '@cawlop.payment_request.builder'

  cawlop.hosted_payment_request.director:
    class: 'CawlOP\PrestaShop\Builder\PaymentRequestDirector'
    public: true
    calls:
      - method: setBuilder
        arguments:
          - '@cawlop.hosted_payment_request.builder'

